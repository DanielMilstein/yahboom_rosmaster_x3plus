planning_scene_monitor_options:
  name: "planning_scene_monitor"
  robot_description: "robot_description"
  joint_state_topic: "/joint_states"
  attached_collision_object_topic: "/moveit_cpp/planning_scene_monitor"
  publish_planning_scene_topic: "/moveit_cpp/publish_planning_scene"
  monitored_planning_scene_topic: "/moveit_cpp/monitored_planning_scene"
  wait_for_initial_state_timeout: 10.0

planning_pipelines:
  pipeline_names: ["ompl"]

plan_request_params:
  planning_attempts: 5
  planning_pipeline: ompl
  max_velocity_scaling_factor: 0.3
  max_acceleration_scaling_factor: 0.3

# Trajectory execution tolerances for the in-process MoveItPy trajectory
# manager. moveit_py's PlanningSceneMonitor and the trajectory-execution
# manager's CurrentStateMonitor can disagree about joint positions by a
# few cm-rad during back-to-back gripper trajectories (one is slower to
# update than the other). 0.05 rad globally absorbs typical arm lag without
# hiding real faults; the grip_joint gets a wider per-joint override
# because the closed-loop close issues rapid back-to-back trajectories.
trajectory_execution:
  allowed_execution_duration_scaling: 1.2
  allowed_goal_duration_margin: 0.5
  allowed_start_tolerance: 0.05
  execution_velocity_scaling: 1.0
  grip_joint:
    allowed_start_tolerance: 0.20
